apiVersion: apps/v1
kind: Deployment
metadata:
  name: result

spec:
  replicas: 2
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
        - name: result
          image: lananh03/result:latest
          ports:
            - containerPort: 4000
          env:
            - name: PG_HOST
              value: postgres-replica
            - name: PG_PORT
              value: "5432"
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: PG_DATABASE
              value: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: result-service

spec:
  selector:
    app: result
  ports:
    - port: 80
      targetPort: 4000