apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-app-ingress

spec:
  ingressClassName: nginx
  rules:
    - host: vote.la.ironlabs.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vote-service
                port:
                  number: 80
    - host: result.la.ironlabs.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: result-service
                port:
                  number: 80